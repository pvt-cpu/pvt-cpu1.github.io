<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PVT 反応時間テスト（最適化版）</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
}
#box {
    width: 300px;
    height: 200px;
    background: gray;
    margin: auto;
    line-height: 200px;
    font-size: 24px;
    color: white;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
button{
    margin-top:20px;
    font-size:18px;
    padding:10px 20px;
}
</style>
</head>
<body>

<h1>PVT（反応時間テスト）</h1>
<p>赤になったらすぐタップ！</p>

<button id="startBtn">テスト開始</button>

<div id="box">待機中...</div>

<script>
let testDuration = 180000;
let testStartTime;

let startTime;
let waiting = false;
let isRunning = false;

let timeoutId = null;
let results = [];

const box = document.getElementById("box");
const startBtn = document.getElementById("startBtn");

// スタート
startBtn.addEventListener("click", () => {
    results = [];
    isRunning = true;
    testStartTime = Date.now();
    startBtn.disabled = true;

    // フルスクリーン（任意）
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }

    startTest();
});

function startTest(){
    box.style.background = "gray";
    box.textContent = "待機中...";
    waiting = true;

    // ✅ 2〜8秒ランダム
    let delay = Math.random() * 6000 + 2000;

    setTimeout(() => {
        if (!isRunning) return;

        // ✅ 描画と計測を同期
        requestAnimationFrame(() => {
            box.style.background = "red";
            box.textContent = "タップ！";
            startTime = performance.now();
            waiting = false;
        });

        // ✅ 10秒無反応 → miss
        timeoutId = setTimeout(() => {
            if (!isRunning) return;

            results.push("miss");

            if (Date.now() - testStartTime >= testDuration) {
                endTest();
                return;
            }

            startTest();
        }, 10000);

    }, delay);
}

// ✅ 共通処理（タップ＆クリック）
function handleResponse() {
    if (!isRunning) return;

    if (waiting) {
        return; // フライング無視
    }

    let endTime = performance.now();
    let reaction = Math.round(endTime - startTime);

    clearTimeout(timeoutId);

    results.push(reaction);

    if (Date.now() - testStartTime >= testDuration) {
        endTest();
        return;
    }

    startTest();
}

// ✅ スマホ高速入力
box.addEventListener("touchstart", handleResponse);
box.addEventListener("click", handleResponse);

// ✅ テスト終了
function endTest() {
    isRunning = false;
    startBtn.disabled = false;

    showStats();
    downloadCSV();
}

// ✅ 統計表示
function showStats() {
    let lapseCount = 0;
    let missCount = 0;

    results.forEach(r => {
        if (r === "miss") {
            missCount++;
        } else if (r >= 500) {
            lapseCount++;
        }
    });

    alert(
        "テスト終了\n\n" +
        "ラプス（500ms以上）: " + lapseCount + " 回\n" +
        "ミス（無反応）: " + missCount + " 回"
    );
}

// ✅ CSV出力
function downloadCSV() {
    let now = new Date();

    let fileName =
        now.getFullYear() +
        (now.getMonth()+1).toString().padStart(2,"0") +
        now.getDate().toString().padStart(2,"0") + "_" +
        now.getHours().toString().padStart(2,"0") +
        now.getMinutes().toString().padStart(2,"0");

    let csv = "trial,reaction_time_ms\n";

    results.forEach((time, index) => {
        csv += (index + 1) + "," + time + "\n";
    });

    let blob = new Blob([csv], { type: "text/csv" });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "pvt_" + fileName + ".csv";

    link.click();
}
</script>

</body>
</html>
